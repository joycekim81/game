<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>테트리스</h1>
      <p class="subtitle">HTML · CSS · JavaScript 입문 프로젝트</p>
    </header>

    <main class="game-area">
      <section class="board-section" aria-label="게임 보드">
        <div id="board" class="board"></div>
      </section>

      <aside class="sidebar">
        <div class="panel">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
        </div>

        <div class="panel controls-panel">
          <button id="start-btn" type="button" class="btn btn-primary">시작</button>
          <button id="restart-btn" type="button" class="btn btn-secondary" disabled>재시작</button>
        </div>

        <div class="panel help-panel">
          <h2>조작법</h2>
          <ul class="help-list">
            <li><kbd>←</kbd> 왼쪽 이동</li>
            <li><kbd>→</kbd> 오른쪽 이동</li>
            <li><kbd>↓</kbd> 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> 블록 회전</li>
            <li><kbd>Space</kbd> 즉시 낙하 (hard drop)</li>
          </ul>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <p id="status-message" class="status-message">시작 버튼을 눌러 게임을 준비하세요.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
